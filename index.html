          id: "3.1.3.6", type: "multi", correct: 1,
          text: "A vertical plane mirror is mounted on a wall. A student of height $H$ stands in front of it. Which of the following parameters affect the minimum vertical length of the mirror required for the student to see their full-length image?\n(1) The height of the student $H$.\n(2) The distance between the student and the mirror.\n(3) The position of the student's eyes relative to the top of their head.",
          options: ["(1) only", "(1) and (3) only", "(2) and (3) only", "(1), (2) and (3)"],
          explanation: {
            statement1: "True. The minimum length of the mirror is exactly $\\frac{H}{2}$, which directly depends on the height of the student.",
            statement2: "False. Geometric similarity shows that the required mirror length is independent of the distance between the student and the mirror.",
            statement3: "True. The vertical positioning of the mirror on the wall depends on the eye level. The upper edge must be level with the midpoint between the eyes and the top of the head.",
            conclusion: "Therefore, (1) and (3) are correct."
          }
        },
        {
          id: "3.1.3.7", type: "calculation", correct: 1,
          text: "A ray of light is incident on plane mirror $A$ at an angle of 40° to the normal. It reflects and strikes plane mirror $B$, which is perpendicular to mirror $A$. Find the angle of reflection at mirror $B$.",
          options: ["40°", "50°", "90°", "10°"],
          explanation: {
            given: "Angle of incidence on mirror $A$, $i_A = 40°$. Mirror $B$ is perpendicular to $A$.",
            formula: "Since the mirrors are perpendicular, the normal of $B$ is parallel to the surface of $A$. This makes the angle of incidence on $B$, $i_B = 90° - i_A$.",
            substitution: "i_B = 90° - 40°",
            answer: "The angle of reflection at mirror B is 50°"
          }
        },
        {
          id: "3.1.3.8", type: "multi", correct: 1,
          text: "An object is placed at a distance $d$ in front of a flat mirror. If the object moves toward the mirror with a velocity $v$, and the mirror simultaneously moves away from the object with a velocity $u$ ($u < v$), which of the following statements is/are correct?\n(1) The relative velocity of the image with respect to the mirror is $v - u$.\n(2) The relative velocity of the image with respect to the object is $2(v - u)$.\n(3) The distance between the object and the image decreases at a rate of $2(v - u)$.",
          options: ["(1) only", "(1) and (2) only", "(2) and (3) only", "(1), (2) and (3)"],
          explanation: {
            statement1: "True. The object's relative velocity to the mirror is $v - u$. Since image distance equals object distance, the image's relative velocity to the mirror is also $v - u$.",
            statement2: "True. The relative velocity of the image with respect to the object is twice their relative velocity to the mirror, which is $2(v - u)$.",
            statement3: "True. The distance between the object and the image is $2 \\times$ (object distance to mirror). This distance decreases at a rate of $2 \\times$ (relative velocity to the mirror), which is $2(v - u)$.",
            conclusion: "Therefore, all three statements (1), (2), and (3) are correct."
          }
        },
        {
          id: "3.1.3.9", type: "multi", correct: 2,
          text: "A student holds a curved mirror. She notices that as she moves her face closer to the mirror, the image is upright and magnified. What type of mirror is she using, and what is the nature of the image?\n(1) It is a convex mirror.\n(2) It is a concave mirror.\n(3) The image formed is virtual.",
          options: ["(1) and (3) only", "(2) only", "(2) and (3) only", "(1), (2) and (3)"],
          explanation: {
            statement1: "False. Convex mirrors always form diminished virtual images, never magnified ones.",
            statement2: "True. A concave mirror forms an upright, magnified virtual image when the object is placed within its focal length ($u < f$).",
            statement3: "True. All upright images formed by single mirrors are virtual.",
            conclusion: "Therefore, (2) and (3) are correct."
          }
        },

          text: "Two plane mirrors are placed parallel to each other at a distance of 20 cm apart. An object is placed 5 cm from Mirror $A$. Find the distance of the second image formed by Mirror $A$ from Mirror $A$ itself.",
          options: ["15 cm", "25 cm", "35 cm", "45 cm"],
          explanation: {
            given: "Distance between mirrors = 20 cm. Object is 5 cm from Mirror $A$ (and 15 cm from Mirror $B$).",
            formula: "First image in $A$ ($I_{A1}$) is at 5 cm behind $A$.\nFirst image in $B$ ($I_{B1}$) is at 15 cm behind $B$, which is $15 + 20 = 35$ cm from Mirror $A$.\nThis $I_{B1}$ acts as a virtual object for Mirror $A$, creating the second image $I_{A2}$ behind Mirror $A$ at the same distance.",
            substitution: "Distance of I_{A2} behind Mirror A = Distance of I_{B1} from Mirror A = 35 cm.",

    // --- CALCULATOR COMPONENT ---
    const FloatingCalculator = ({ onClose }) => {
      const [display, setDisplay] = useState('0');
      
      const handleBtn = (val) => {
        if (display === '0' || display === 'Error') { setDisplay(val); } else { setDisplay(display + val); }
      };

      const calculate = () => {
        try {
          let expr = display;
          expr = expr.replace(/sin\(([^)]+)\)/g, 'Math.sin($1 * Math.PI / 180)');
          expr = expr.replace(/cos\(([^)]+)\)/g, 'Math.cos($1 * Math.PI / 180)');
          expr = expr.replace(/tan\(([^)]+)\)/g, 'Math.tan($1 * Math.PI / 180)');
          expr = expr.replace(/√\(([^)]+)\)/g, 'Math.sqrt($1)');
          expr = expr.replace(/π/g, 'Math.PI');
          expr = expr.replace(/\^2/g, '**2');
          
          const result = new Function('return ' + expr)();
          const formatted = Number(Math.round(result + "e10") + "e-10").toString();
          setDisplay(formatted);
        } catch (e) {
          setDisplay('Error');
        }
      };

      const clear = () => setDisplay('0');
      const del = () => setDisplay(display.length > 1 ? display.slice(0, -1) : '0');

      const btnClass = "bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white p-3 rounded-lg text-lg font-bold shadow-md transition-colors";
      const funcClass = "bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-400 text-white p-3 rounded-lg text-sm font-bold shadow-md transition-colors";

      return (
        <div className="fixed bottom-4 right-4 z-50 w-80 bg-slate-800 border-2 border-indigo-500 rounded-2xl shadow-2xl overflow-hidden flex flex-col animate-in slide-in-from-bottom-8">
          <div className="bg-indigo-900 p-3 flex justify-between items-center border-b border-indigo-500/50 cursor-move">
            <div className="flex items-center gap-2 text-indigo-200">
              <Icon name="Calculator" className="w-4 h-4" />
              <span className="font-bold text-sm">Scientific Calc (DEG)</span>
            </div>
            <button onClick={onClose} className="text-indigo-200 hover:text-white"><Icon name="X" className="w-5 h-5"/></button>
          </div>
          <div className="p-4 bg-slate-900">
            <div className="w-full bg-slate-950 text-right text-3xl font-mono p-4 rounded-xl mb-4 text-green-400 overflow-x-auto whitespace-nowrap shadow-inner border border-slate-700 min-h-[72px]">
              {display}
            </div>
            <div className="grid grid-cols-4 gap-2">
              <button onClick={() => handleBtn('sin(')} className={funcClass}>sin</button>
              <button onClick={() => handleBtn('cos(')} className={funcClass}>cos</button>
              <button onClick={() => handleBtn('tan(')} className={funcClass}>tan</button>
              <button onClick={() => handleBtn('π')} className={funcClass}>π</button>
              
              <button onClick={() => handleBtn('√(')} className={funcClass}>√</button>
              <button onClick={() => handleBtn('^2')} className={funcClass}>x²</button>
              <button onClick={() => handleBtn('(')} className={funcClass}>(</button>
              <button onClick={() => handleBtn(')')} className={funcClass}>)</button>
              
              <button onClick={() => handleBtn('7')} className={btnClass}>7</button>
              <button onClick={() => handleBtn('8')} className={btnClass}>8</button>
              <button onClick={() => handleBtn('9')} className={btnClass}>9</button>
              <button onClick={() => handleBtn('/')} className="bg-orange-600 hover:bg-orange-500 text-white p-3 rounded-lg text-lg font-bold">÷</button>
              
              <button onClick={() => handleBtn('4')} className={btnClass}>4</button>
              <button onClick={() => handleBtn('5')} className={btnClass}>5</button>
              <button onClick={() => handleBtn('6')} className={btnClass}>6</button>
              <button onClick={() => handleBtn('*')} className="bg-orange-600 hover:bg-orange-500 text-white p-3 rounded-lg text-lg font-bold">×</button>
              
              <button onClick={() => handleBtn('1')} className={btnClass}>1</button>
              <button onClick={() => handleBtn('2')} className={btnClass}>2</button>
              <button onClick={() => handleBtn('3')} className={btnClass}>3</button>
              <button onClick={() => handleBtn('-')} className="bg-orange-600 hover:bg-orange-500 text-white p-3 rounded-lg text-lg font-bold">-</button>
              
              <button onClick={clear} className="bg-red-600 hover:bg-red-500 text-white p-3 rounded-lg text-sm font-bold">AC</button>
              <button onClick={() => handleBtn('0')} className={btnClass}>0</button>
              <button onClick={() => handleBtn('.')} className={btnClass}>.</button>
              <button onClick={() => handleBtn('+')} className="bg-orange-600 hover:bg-orange-500 text-white p-3 rounded-lg text-lg font-bold">+</button>
              
              <button onClick={del} className="col-span-2 bg-slate-600 hover:bg-slate-500 text-white p-3 rounded-lg text-sm font-bold">DEL</button>
              <button onClick={calculate} className="col-span-2 bg-green-600 hover:bg-green-500 text-white p-3 rounded-lg text-xl font-bold">=</button>
            </div>
          </div>
        </div>
      );
    };

                        const isSelected = userAnswers[currentQIndex] === index;
                        const isCorrect = index === questions[currentQIndex].correct;
                        const showCorrect = showExplanation && isCorrect;
                        const showWrong = showExplanation && isSelected && !isCorrect;

                        let btnClass = "w-full text-left p-4 md:p-5 rounded-2xl border-2 transition-all duration-200 text-base md:text-lg flex items-center justify-between ";
                        
                        if (!showExplanation) {
                          btnClass += "border-slate-700 bg-slate-800/50 hover:border-indigo-500 hover:bg-slate-800 text-slate-300 hover:text-white";
                        } else if (showCorrect) {
                          btnClass += "border-green-500 bg-green-500/10 text-green-400 font-bold shadow-[0_0_15px_rgba(34,197,94,0.2)]";
                        } else if (showWrong) {
                          btnClass += "border-red-500 bg-red-500/10 text-red-400 font-bold opacity-75";
                        } else {
                          btnClass += "border-slate-800 bg-slate-900/50 text-slate-600 opacity-50";
                        }

                        return (
                          <button
                            key={index}
                            disabled={showExplanation}
                            onClick={() => handleOptionSelect(index)}
                            className={btnClass}
                          >
                            <div className="flex gap-4">
                              <span className={`w-8 h-8 flex items-center justify-center rounded-lg border ${showCorrect ? 'bg-green-500 text-slate-900 border-green-500' : showWrong ? 'bg-red-500 text-slate-900 border-red-500' : 'border-slate-600'}`}>
                                {String.fromCharCode(65 + index)}
                              </span>
                              <span className="mt-1 leading-snug">{opt}</span>
                            </div>
                            {showCorrect && <Icon name="Check" className="w-6 h-6 text-green-500 flex-shrink-0" />}
                            {showWrong && <Icon name="XCircle" className="w-6 h-6 text-red-500 flex-shrink-0" />}
                          </button>
                        );
                      })}
                    </div>

                    {showExplanation && <ExplanationBlock question={questions[currentQIndex]} />}

                    {showExplanation && (
                      <button 
                        onClick={handleNext}
                        className="w-full mt-8 bg-gradient-to-r from-indigo-500 to-fuchsia-600 hover:from-indigo-400 hover:to-fuchsia-500 text-white font-bold py-4 rounded-xl text-lg shadow-lg shadow-indigo-500/25 transition-all transform hover:-translate-y-1 active:translate-y-0 flex items-center justify-center gap-2"
                      >
                        {currentQIndex < questions.length - 1 ? t.next : t.finish}
                      </button>
                    )}
                 </div>
              </div>
            )}

            {/* VIEW 4: RESULT SCREEN */}
            {currentView === 'result' && (
              <div className="max-w-xl mx-auto text-center animate-in zoom-in-95 duration-500">
                <div className="bg-slate-900 p-10 rounded-3xl border border-slate-800 shadow-2xl relative overflow-hidden">
                  <div className="absolute inset-0 bg-gradient-to-b from-indigo-500/10 to-transparent"></div>
                  
                  <div className="relative z-10">
                    <Icon name="Trophy" className="w-24 h-24 text-yellow-400 mx-auto mb-6 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]" />
                    <h2 className="text-3xl font-black text-white mb-2">Quiz Completed!</h2>
                    <p className="text-slate-400 mb-8">{selectedTopic.title} • Level {selectedLevel}</p>
                    
                    <div className="flex justify-center mb-10">
                      <div className="relative w-48 h-48">
                        <svg className="w-full h-full transform -rotate-90">
                          <circle cx="96" cy="96" r="88" className="stroke-slate-800" strokeWidth="16" fill="none" />
                          <circle 
                            cx="96" cy="96" r="88" 
                            className="stroke-indigo-550 transition-all duration-1000 ease-out" 
                            strokeWidth="16" fill="none" 
                            strokeDasharray={2 * Math.PI * 88}
                            strokeDashoffset={(2 * Math.PI * 88) * (1 - (score / questions.length))}
                            strokeLinecap="round"
                          />
                        </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                          <span className="text-5xl font-black text-white">{score}</span>
                          <span className="text-sm font-bold text-slate-400">/ {questions.length}</span>
                        </div>
                      </div>
                    </div>

                    <div className="space-y-4">
                      <button 
                        onClick={() => setCurrentView('levels')}
                        className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-xl transition-colors border border-slate-700"
                      >
                        Play Another Level
                      </button>
                      <button 
                        onClick={() => setCurrentView('topics')}
                        className="w-full bg-transparent hover:bg-slate-800/50 text-slate-400 font-bold py-4 rounded-xl transition-colors"
                      >
                        {t.home}
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>

          {calcOpen && <FloatingCalculator onClose={() => setCalcOpen(false)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
